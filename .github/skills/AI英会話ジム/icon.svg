<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- オレンジ背景 -->
  <rect width="128" height="128" rx="16" fill="#FF9500"/>
  
  <!-- グラデーション用定義 -->
  <defs>
    <linearGradient id="orangeGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFA500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- グラデーション付きオレンジ背景 -->
  <rect width="128" height="128" rx="16" fill="url(#orangeGradient)"/>
  
  <!-- 「英」という漢字を中央に配置 -->
  <text x="64" y="82" font-size="72" font-weight="bold" font-family="'Hiragino Sans', 'Yu Gothic', sans-serif" fill="white" text-anchor="middle" alignment-baseline="middle">英</text>
  
  <!-- 光沢効果 -->
  <rect width="128" height="64" rx="16" fill="white" opacity="0.1"/>
</svg>